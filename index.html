<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">
        <h3>User Registration</h3>

        <form id="regForm">
            <input type="text" id="name" class="form-control mb-3" placeholder="Name" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100">Register</button>
        </form>

        <a href="data.html" class="btn btn-success mt-3">View Data</a>
    </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("regForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    // Push to array
    users.push(user);

    // Save to localStorage
    localStorage.setItem("users", JSON.stringify(users));

    // AJAX POST (dummy API)
    fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(user)
    })
    .then(res => res.json())
    .then(data => {
        console.log("Server Response:", data);
        alert("Registration Successful!");
        document.getElementById("regForm").reset();
    })
    .catch(err => console.error(err));
});
</script>

</body>
</html>
