<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center py-3">Dashboard</h4>
    <a href="#">🏠 Home</a>
    <a href="#">📦 Products</a>
    <a href="#">👨‍🎓 Students</a>
    <a href="#">📝 Exams</a>
    <a href="#">📊 Reports</a>
    <a href="#">⚙ Settings</a>
</div>

<!-- Content -->
<div class="content">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">Admin Panel</span>
        </div>
    </nav>

    <!-- Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Total Users</h5>
                <h2>1,250</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Total Sales</h5>
                <h2>$8,500</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Exams Conducted</h5>
                <h2>45</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h5>Revenue</h5>
                <h2>$12,300</h2>
            </div>
        </div>

    </div>

    <!-- Table -->
    <div class="mt-5">
        <h4>Recent Activity</h4>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Action</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Omkar</td>
                    <td>Added new product</td>
                    <td>29 Apr 2026</td>
                </tr>
                <tr>
                    <td>Rahul</td>
                    <td>Completed Exam</td>
                    <td>28 Apr 2026</td>
                </tr>
                <tr>
                    <td>Sneha</td>
                    <td>Registered</td>
                    <td>27 Apr 2026</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
